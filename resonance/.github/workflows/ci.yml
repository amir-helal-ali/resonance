# ============================================================================
# Resonance (صدى) — CI Pipeline
# Runs on every push and PR to main. Stages:
#   1. lint   — cargo fmt --check + cargo clippy
#   2. test   — cargo test
#   3. build  — cargo build --release --bins
#   4. docker — docker compose build (smoke check)
#   5. frontend — pnpm install + pnpm check + pnpm build
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true

jobs:
  # --------------------------------------------------------------------------
  # Backend: fmt + clippy
  # --------------------------------------------------------------------------
  rust-lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install system deps (OpenSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # --------------------------------------------------------------------------
  # Backend: tests
  # --------------------------------------------------------------------------
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo test
        run: cargo test --all-features --no-fail-fast

  # --------------------------------------------------------------------------
  # Backend: release build
  # --------------------------------------------------------------------------
  rust-build:
    name: Rust release build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo build --release
        run: cargo build --release --bins

  # --------------------------------------------------------------------------
  # Frontend: svelte-check + build
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (svelte-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        continue-on-error: true # no lockfile yet on first run
      - name: svelte-check
        run: pnpm check
        continue-on-error: true # type errors are non-blocking for now
      - name: build
        run: pnpm build

  # --------------------------------------------------------------------------
  # Docker: docker compose build smoke
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker compose build
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test, rust-build, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: resonance-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: resonance-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
